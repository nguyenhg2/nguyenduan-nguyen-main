version: '3.9'

services:
  mongo:
    image: mongo:6
    container_name: incident_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  osrm:
    image: osrm/osrm-backend:latest
    container_name: incident_osrm
    ports:
      - "5000:5000"
    volumes:
      - osrm_data:/data
    command: >
      osrm-routed --algorithm mld /data/vietnam-latest.osrm
    depends_on:
      osrm-init:
        condition: service_completed_successfully

  osrm-init:
    image: osrm/osrm-backend:latest
    container_name: incident_osrm_init
    volumes:
      - osrm_data:/data
    entrypoint: /bin/bash
    command: >
      -c "
      if [ -f /data/vietnam-latest.osrm.datasource_names ]; then
        echo 'OSRM data already prepared, skipping...';
        exit 0;
      fi;
      echo 'Downloading Vietnam OSM data...';
      apt-get update && apt-get install -y wget;
      wget -q -O /data/vietnam-latest.osm.pbf https://download.geofabrik.de/asia/vietnam-latest.osm.pbf;
      echo 'Extracting...';
      osrm-extract -p /opt/car.lua /data/vietnam-latest.osm.pbf;
      echo 'Partitioning...';
      osrm-partition /data/vietnam-latest.osrm;
      echo 'Customizing...';
      osrm-customize /data/vietnam-latest.osrm;
      echo 'Done! OSRM Vietnam data ready.';
      "

  backend:
    build: ./backend
    container_name: incident_backend
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=incident_response
      - JWT_SECRET=dev-secret
      - CORS_ORIGINS=http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy   # ← chờ mongo ping được mới start

  frontend:
    build: ./frontend
    container_name: incident_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  seed:
    build: ./backend
    container_name: incident_seed
    command: ["/bin/sh", "-c", "sleep 5 && python -m app.seed.seed_data"]
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=incident_response
      - JWT_SECRET=dev-secret
    depends_on:
      mongo:
        condition: service_healthy   
    profiles:
      - seed

volumes:
  mongo_data:
  osrm_data: